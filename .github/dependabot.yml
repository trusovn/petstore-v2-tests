# Keeps the pinned GitHub Actions current. Actions are pinned by commit SHA
# (with a # vX.Y.Z comment); Dependabot updates the SHA and the comment together.
# The Petstore image is intentionally pinned by digest in compose.yaml for
# deterministic contract tests and is NOT auto-updated here.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Keep the pinned Allure Report CLI (reporting/package.json) current.
  # allure is pinned exactly; Dependabot opens a PR to bump it with an updated
  # package-lock.json.
  - package-ecosystem: "npm"
    directory: "/reporting"
    schedule:
      interval: "weekly"
    allow:
      - dependency-name: "allure"
