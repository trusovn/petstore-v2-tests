services:
  petstore:
    image: swaggerapi/petstore:1.0.7@sha256:87d0270162a94dc0fcbd553549139b28a10ffede3f1b2a5a9de56ab11be8d38e
    ports:
      - "${PETSTORE_PORT:-8080}:8080"
    environment:
      SWAGGER_BASE_PATH: /v2
      SWAGGER_URL: "http://localhost:${PETSTORE_PORT:-8080}"
    volumes:
      - type: bind
        source: "${PETSTORE_ACCESS_LOG_DIR:-./.runtime/petstore-logs/access}"
        target: /var/log
